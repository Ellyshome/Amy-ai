services:
  amy-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        APT_MIRROR: mirrors.aliyun.com
    container_name: amy-dev
    working_dir: /app
    stdin_open: true
    tty: true
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-9899}:${WEB_PORT:-9899}"
    volumes:
      - ..:/app
      - ./cow:/home/agent/cow
      - venv-data:/opt/venv
    environment:
      # DeepSeek API（OpenAI 兼容通道）
      OPEN_AI_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPEN_AI_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      MODEL: ${MODEL:-deepseek-chat}
      # 渠道（开发环境用 Web）
      CHANNEL_TYPE: ${CHANNEL_TYPE:-web}
      WEB_PORT: ${WEB_PORT:-9899}
      # Agent
      AGENT: ${AGENT:-True}
      AGENT_MAX_CONTEXT_TOKENS: ${AGENT_MAX_CONTEXT_TOKENS:-40000}
      AGENT_MAX_CONTEXT_TURNS: ${AGENT_MAX_CONTEXT_TURNS:-20}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-15}
      # 运行时
      PYTHONUNBUFFERED: '1'

volumes:
  venv-data:
