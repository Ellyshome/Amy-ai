services:
  amy-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        APT_MIRROR: mirrors.aliyun.com
    container_name: amy-dev
    working_dir: /app
    stdin_open: true
    tty: true
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-9899}:${WEB_PORT:-9899}"
    volumes:
      - ..:/app
      - ./cow:/home/agent/cow
      - venv-data:/opt/venv
    environment:
      # API Keys (敏感信息放 .env，不进代码仓库)
      OPEN_AI_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPEN_AI_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      # 运行时 (非业务配置，不通过 config.json 管理)
      PYTHONUNBUFFERED: '1'

volumes:
  venv-data:
