<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0d9a0; font-family: sans-serif; }
  .wrap { text-align: center; }
  h2 { margin-bottom: 10px; }
  #info { margin-bottom: 8px; font-size: 18px; }
  canvas { cursor: pointer; border: 2px solid #333; border-radius: 4px; }
  button { margin-top: 10px; padding: 6px 24px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <h2>五子棋</h2>
  <div id="info">当前玩家: ● 黑方</div>
  <canvas id="board" width="600" height="600"></canvas>
  <br>
  <button onclick="restart()">重新开始</button>
</div>
<script>
const N = 15, CELL = 40, PAD = 20;
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");
let board = Array.from({length: N}, () => Array(N).fill(0));
let current = 1; // 1=black, 2=white
let over = false;

function draw() {
  ctx.fillStyle = "#e8c860";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < N; i++) {
    ctx.beginPath(); ctx.moveTo(PAD, PAD + i * CELL); ctx.lineTo(PAD + (N - 1) * CELL, PAD + i * CELL); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PAD + i * CELL, PAD); ctx.lineTo(PAD + i * CELL, PAD + (N - 1) * CELL); ctx.stroke();
  }
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (board[r][c] === 0) continue;
      ctx.beginPath();
      ctx.arc(PAD + c * CELL, PAD + r * CELL, CELL * 0.42, 0, Math.PI * 2);
      ctx.fillStyle = board[r][c] === 1 ? "#222" : "#eee";
      ctx.fill();
      ctx.strokeStyle = "#555";
      ctx.stroke();
    }
  }
}

function checkWin(row, col) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let cnt = 1;
    for (const d of [1, -1]) {
      let r = row + dr * d, c = col + dc * d;
      while (r >= 0 && r < N && c >= 0 && c < N && board[r][c] === current) {
        cnt++; r += dr * d; c += dc * d;
      }
    }
    if (cnt >= 5) return true;
  }
  return false;
}

canvas.addEventListener("click", e => {
  if (over) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const col = Math.round((x - PAD) / CELL), row = Math.round((y - PAD) / CELL);
  if (row < 0 || row >= N || col < 0 || col >= N || board[row][col] !== 0) return;

  board[row][col] = current;
  draw();

  if (checkWin(row, col)) {
    info.textContent = `${current === 1 ? "● 黑方" : "○ 白方"} 获胜!`;
    over = true;
    return;
  }
  if (board.every(row => row.every(v => v !== 0))) {
    info.textContent = "平局!";
    over = true;
    return;
  }
  current = current === 1 ? 2 : 1;
  info.textContent = `当前玩家: ${current === 1 ? "● 黑方" : "○ 白方"}`;
});

function restart() {
  board = Array.from({length: N}, () => Array(N).fill(0));
  current = 1; over = false;
  info.textContent = "当前玩家: ● 黑方";
  draw();
}

draw();
</script>
</body>
</html>
